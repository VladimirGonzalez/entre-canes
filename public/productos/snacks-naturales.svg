<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Snacks naturales premium para perros">
  <!-- Soft amber backdrop circle -->
  <circle cx="400" cy="300" r="220" fill="#F59E0B" opacity="0.10"/>

  <!-- Kraft paper bag -->
  <g transform="translate(280, 160)">
    <!-- Folded top -->
    <path d="M 0 30 L 40 0 L 200 0 L 240 30 Z" fill="#0F172A"/>
    <!-- Bag body -->
    <path d="M 0 30 L 240 30 L 240 360 L 0 360 Z" fill="#1E293B"/>
    <!-- Side fold shadow -->
    <path d="M 30 30 L 30 360" stroke="#0F172A" stroke-width="2" opacity="0.6"/>
    <path d="M 210 30 L 210 360" stroke="#0F172A" stroke-width="2" opacity="0.6"/>
    <!-- Front label area -->
    <rect x="40" y="120" width="160" height="180" rx="12" fill="#FFFFFF"/>
    <!-- Label content -->
    <text x="120" y="170" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="2">PREMIUM</text>
    <line x1="60" y1="180" x2="180" y2="180" stroke="#F59E0B" stroke-width="3"/>
    <text x="120" y="220" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A" text-anchor="middle">SNACKS</text>
    <text x="120" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">NATURALES</text>
    <!-- Paw icon -->
    <g transform="translate(120, 275)">
      <circle cx="0" cy="2" r="8" fill="#F59E0B"/>
      <ellipse cx="-10" cy="-8" rx="3.5" ry="5" fill="#F59E0B"/>
      <ellipse cx="10" cy="-8" rx="3.5" ry="5" fill="#F59E0B"/>
      <ellipse cx="-16" cy="0" rx="3" ry="4" fill="#F59E0B"/>
      <ellipse cx="16" cy="0" rx="3" ry="4" fill="#F59E0B"/>
    </g>
    <!-- Weight indicator -->
    <rect x="60" y="320" width="120" height="22" rx="11" fill="#F59E0B"/>
    <text x="120" y="335" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0F172A" text-anchor="middle">250 g · 100% NATURAL</text>
  </g>

  <!-- Bone treats falling out / next to bag -->
  <g transform="translate(170, 480) rotate(-20)">
    <rect x="0" y="-7" width="56" height="14" rx="7" fill="#FCD34D"/>
    <circle cx="0" cy="-7" r="9" fill="#FCD34D"/>
    <circle cx="0" cy="7" r="9" fill="#FCD34D"/>
    <circle cx="56" cy="-7" r="9" fill="#FCD34D"/>
    <circle cx="56" cy="7" r="9" fill="#FCD34D"/>
  </g>
  <g transform="translate(560, 480) rotate(15)">
    <rect x="0" y="-7" width="56" height="14" rx="7" fill="#F59E0B"/>
    <circle cx="0" cy="-7" r="9" fill="#F59E0B"/>
    <circle cx="0" cy="7" r="9" fill="#F59E0B"/>
    <circle cx="56" cy="-7" r="9" fill="#F59E0B"/>
    <circle cx="56" cy="7" r="9" fill="#F59E0B"/>
  </g>
  <g transform="translate(620, 510) rotate(-10)">
    <rect x="0" y="-5" width="40" height="10" rx="5" fill="#FCD34D"/>
    <circle cx="0" cy="-5" r="6.5" fill="#FCD34D"/>
    <circle cx="0" cy="5" r="6.5" fill="#FCD34D"/>
    <circle cx="40" cy="-5" r="6.5" fill="#FCD34D"/>
    <circle cx="40" cy="5" r="6.5" fill="#FCD34D"/>
  </g>
</svg>
