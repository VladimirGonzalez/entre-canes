<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arnés anti-tirón regulable">
  <!-- Soft amber backdrop circle -->
  <circle cx="400" cy="300" r="220" fill="#F59E0B" opacity="0.10"/>

  <!-- Harness body — chest strap (front) -->
  <g transform="translate(400, 300)">
    <!-- Top neck loop -->
    <path d="M -110 -120 Q 0 -180 110 -120 L 110 -90 Q 0 -150 -110 -90 Z" fill="#0F172A"/>
    <!-- Chest plate (Y-shape) -->
    <path d="M -90 -100 L 90 -100 L 60 30 L 0 60 L -60 30 Z" fill="#1E293B"/>
    <!-- Bottom belly strap -->
    <path d="M -130 30 Q -130 60 -100 60 L 100 60 Q 130 60 130 30 L 130 0 Q 130 -10 110 -10 L -110 -10 Q -130 -10 -130 0 Z" fill="#0F172A"/>
    <!-- Stitching lines -->
    <path d="M -90 -100 L 90 -100" fill="none" stroke="#F59E0B" stroke-width="3" stroke-dasharray="6,6" opacity="0.7"/>
    <path d="M -130 15 L 130 15" fill="none" stroke="#F59E0B" stroke-width="3" stroke-dasharray="6,6" opacity="0.7"/>
  </g>

  <!-- Front D-ring (anti-pull point) -->
  <g transform="translate(400, 270)">
    <circle r="22" fill="none" stroke="#F59E0B" stroke-width="6"/>
    <circle r="22" fill="#FCD34D" opacity="0.3"/>
  </g>

  <!-- Buckle on belly strap -->
  <g transform="translate(400, 360)">
    <rect x="-22" y="-12" width="44" height="24" rx="4" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
    <rect x="-16" y="-6" width="32" height="12" rx="2" fill="#CBD5E1"/>
  </g>

  <!-- Adjuster on shoulder strap -->
  <g transform="translate(330, 230)">
    <rect x="-14" y="-8" width="28" height="16" rx="2" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#475569" stroke-width="1.5"/>
    <line x1="-8" y1="4" x2="8" y2="4" stroke="#475569" stroke-width="1.5"/>
  </g>
  <g transform="translate(470, 230)">
    <rect x="-14" y="-8" width="28" height="16" rx="2" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#475569" stroke-width="1.5"/>
    <line x1="-8" y1="4" x2="8" y2="4" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- "Anti-pull" badge -->
  <g transform="translate(640, 130)">
    <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#F59E0B"/>
    <text x="0" y="6" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">ANTI-TIRÓN</text>
  </g>
</svg>
