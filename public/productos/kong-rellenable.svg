<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Juguete rellenable Anti-aburrimiento">
  <!-- Soft amber backdrop circle -->
  <circle cx="400" cy="300" r="220" fill="#F59E0B" opacity="0.10"/>

  <!-- Kong-style stacked toy (3 tiers) -->
  <g transform="translate(400, 320)">
    <!-- Bottom tier (largest) -->
    <ellipse cx="0" cy="120" rx="120" ry="50" fill="#0F172A"/>
    <path d="M -120 120 Q -120 60 -90 30 L 90 30 Q 120 60 120 120 Z" fill="#0F172A"/>
    <!-- Highlight on bottom -->
    <ellipse cx="-50" cy="80" rx="30" ry="20" fill="#1E293B" opacity="0.7"/>
    <!-- Middle tier -->
    <ellipse cx="0" cy="20" rx="90" ry="36" fill="#1E293B"/>
    <path d="M -90 20 Q -90 -30 -65 -55 L 65 -55 Q 90 -30 90 20 Z" fill="#1E293B"/>
    <!-- Top tier (smallest) -->
    <ellipse cx="0" cy="-65" rx="58" ry="24" fill="#0F172A"/>
    <path d="M -58 -65 Q -58 -110 -35 -130 L 35 -130 Q 58 -110 58 -65 Z" fill="#0F172A"/>
    <!-- Hole at top (hollow indicator) -->
    <ellipse cx="0" cy="-128" rx="30" ry="10" fill="#475569"/>
    <ellipse cx="0" cy="-128" rx="22" ry="6" fill="#0F172A"/>

    <!-- Treats peeking from inside -->
    <g transform="translate(0, -125)">
      <circle cx="-8" cy="-2" r="4" fill="#F59E0B"/>
      <circle cx="6" cy="0" r="3.5" fill="#FCD34D"/>
    </g>

    <!-- Highlight gloss -->
    <ellipse cx="-30" cy="-90" rx="10" ry="22" fill="#FFFFFF" opacity="0.15"/>
    <ellipse cx="-50" cy="0" rx="12" ry="32" fill="#FFFFFF" opacity="0.10"/>
  </g>

  <!-- Floating treats around -->
  <g transform="translate(200, 220) rotate(-20)">
    <rect x="0" y="-5" width="40" height="10" rx="5" fill="#F59E0B"/>
    <circle cx="0" cy="-5" r="7" fill="#F59E0B"/>
    <circle cx="0" cy="5" r="7" fill="#F59E0B"/>
    <circle cx="40" cy="-5" r="7" fill="#F59E0B"/>
    <circle cx="40" cy="5" r="7" fill="#F59E0B"/>
  </g>
  <g transform="translate(610, 200)">
    <circle r="14" fill="#FCD34D"/>
    <circle r="14" fill="none" stroke="#D97706" stroke-width="2" opacity="0.6"/>
  </g>
  <circle cx="640" cy="380" r="9" fill="#F59E0B"/>
  <circle cx="180" cy="400" r="11" fill="#FCD34D"/>

  <!-- Sparkle accents -->
  <g fill="#F59E0B">
    <path d="M 150 180 L 160 195 L 170 180 L 160 165 Z"/>
    <path d="M 660 130 L 670 145 L 680 130 L 670 115 Z"/>
  </g>
</svg>
