<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kit Modificación de Conducta">
  <!-- Soft amber backdrop circle -->
  <circle cx="400" cy="300" r="240" fill="#F59E0B" opacity="0.10"/>

  <!-- Layout: 4 items arranged in a pro grid -->

  <!-- Clicker (top left) -->
  <g transform="translate(170, 180)">
    <!-- Body -->
    <rect x="0" y="0" width="140" height="80" rx="14" fill="#0F172A"/>
    <!-- Button -->
    <ellipse cx="70" cy="38" rx="34" ry="22" fill="#F59E0B"/>
    <ellipse cx="70" cy="34" rx="28" ry="16" fill="#FCD34D"/>
    <!-- Wrist strap loop -->
    <circle cx="125" cy="40" r="8" fill="none" stroke="#475569" stroke-width="3"/>
    <!-- Brand line -->
    <rect x="14" y="14" width="40" height="6" rx="3" fill="#475569"/>
  </g>

  <!-- Long line / leash (top right - coiled) -->
  <g transform="translate(540, 200)" fill="none" stroke-linecap="round">
    <circle r="60" stroke="#0F172A" stroke-width="14"/>
    <circle r="38" stroke="#1E293B" stroke-width="14"/>
    <circle r="60" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <circle r="38" stroke="#475569" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Snap clip on the leash -->
  <g transform="translate(530, 130)">
    <rect x="0" y="0" width="20" height="40" rx="4" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
    <circle cx="10" cy="10" r="3" fill="none" stroke="#475569" stroke-width="2"/>
  </g>

  <!-- Treat pouch (bottom left) -->
  <g transform="translate(140, 360)">
    <!-- Body -->
    <path d="M 0 30 Q 0 0 30 0 L 150 0 Q 180 0 180 30 L 180 130 Q 180 160 150 160 L 30 160 Q 0 160 0 130 Z" fill="#1E293B"/>
    <!-- Drawstring top -->
    <path d="M 10 14 Q 90 -14 170 14" fill="none" stroke="#0F172A" stroke-width="6"/>
    <!-- Front pocket -->
    <rect x="20" y="50" width="140" height="80" rx="10" fill="#FFFFFF"/>
    <!-- Treats inside (peek) -->
    <circle cx="50" cy="100" r="9" fill="#F59E0B"/>
    <circle cx="80" cy="105" r="7" fill="#FCD34D"/>
    <circle cx="110" cy="98" r="8" fill="#F59E0B"/>
    <circle cx="135" cy="106" r="6" fill="#FCD34D"/>
    <!-- Label -->
    <rect x="55" y="62" width="70" height="20" rx="10" fill="#F59E0B"/>
    <text x="90" y="76" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">PREMIOS</text>
    <!-- Belt loop -->
    <rect x="-20" y="60" width="20" height="12" rx="2" fill="#475569"/>
    <rect x="180" y="60" width="20" height="12" rx="2" fill="#475569"/>
  </g>

  <!-- Manual / booklet (bottom right) -->
  <g transform="translate(490, 380)">
    <!-- Book cover -->
    <rect x="0" y="0" width="170" height="130" rx="10" fill="#0F172A"/>
    <!-- Spine line -->
    <line x1="14" y1="0" x2="14" y2="130" stroke="#1E293B" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="30" y="20" width="120" height="6" rx="3" fill="#F59E0B"/>
    <!-- Title -->
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle">MANUAL</text>
    <text x="90" y="74" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8" text-anchor="middle">DE PAUTAS</text>
    <!-- Paw -->
    <g transform="translate(90, 100)">
      <circle cx="0" cy="2" r="9" fill="#F59E0B"/>
      <ellipse cx="-12" cy="-9" rx="4" ry="6" fill="#F59E0B"/>
      <ellipse cx="12" cy="-9" rx="4" ry="6" fill="#F59E0B"/>
      <ellipse cx="-19" cy="0" rx="3.5" ry="5" fill="#F59E0B"/>
      <ellipse cx="19" cy="0" rx="3.5" ry="5" fill="#F59E0B"/>
    </g>
  </g>

  <!-- Pro badge -->
  <g transform="translate(400, 100)">
    <rect x="-50" y="-22" width="100" height="44" rx="22" fill="#0F172A"/>
    <text x="0" y="6" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#F59E0B" text-anchor="middle">KIT PRO</text>
  </g>
</svg>
